<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연애 스타일 테스트</title>
  <style>
    body {
      margin: 0;
      font-family: "Pretendard", sans-serif;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      width: 90%;
      max-width: 400px;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: #f472b6;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #ec4899;
    }
    .progress {
      margin-top: 10px;
      font-size: 12px;
      color: gray;
    }
    .result-type {
      font-size: 20px;
      font-weight: bold;
    }
    .match {
      color: #ec4899;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2 id="question"></h2>
  <div id="answers"></div>
  <div class="progress" id="progress"></div>
</div>

<script>
const questions = [
  {
    q: "연인이 연락이 없을 때 나는?",
    a: ["걱정돼서 계속 확인한다", "바쁠 수 있으니 기다린다", "나도 내 시간을 보낸다"],
  },
  {
    q: "데이트 스타일은?",
    a: ["항상 붙어있고 싶다", "적당히 자주 본다", "각자 시간도 중요"],
  },
  {
    q: "싸웠을 때 나는?",
    a: ["바로 풀고 싶다", "시간 두고 이야기", "혼자 정리 필요"],
  },
  {
    q: "애정 표현은?",
    a: ["자주 한다", "적당히 한다", "많이 안 한다"],
  },
  {
    q: "연애에서 가장 중요한 건?",
    a: ["안정감", "균형", "자유"],
  },
];

let step = 0;
let answers = [];

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const progressEl = document.getElementById("progress");

function renderQuestion() {
  const current = questions[step];
  questionEl.innerText = current.q;
  answersEl.innerHTML = "";

  current.a.forEach((choice, index) => {
    const btn = document.createElement("button");
    btn.innerText = choice;
    btn.onclick = () => handleAnswer(index);
    answersEl.appendChild(btn);
  });

  progressEl.innerText = `${step + 1} / ${questions.length}`;
}

function handleAnswer(index) {
  answers.push(index);

  if (step + 1 < questions.length) {
    step++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  const sum = answers.reduce((a, b) => a + b, 0);

  let result;

  if (sum <= 3) {
    result = {
      type: "🌹 로맨틱 집착형",
      desc: "애정 표현이 많고 상대에게 깊이 몰입하는 스타일",
      match: "안정감 있고 표현을 잘 받아주는 사람과 궁합이 좋아요",
    };
  } else if (sum <= 7) {
    result = {
      type: "💐 균형 잡힌 부케형",
      desc: "사랑과 개인 시간을 잘 조절하는 이상적인 스타일",
      match: "비슷한 균형형 또는 감정이 안정적인 사람과 최고",
    };
  } else {
    result = {
      type: "🌿 자유로운 그린형",
      desc: "자유와 개인 시간을 중요시하는 쿨한 스타일",
      match: "간섭이 적고 이해심 많은 사람과 잘 맞아요",
    };
  }

  questionEl.innerText = "결과";
  answersEl.innerHTML = `
    <div class="result-type">${result.type}</div>
    <p>${result.desc}</p>
    <p class="match">궁합: ${result.match}</p>
    <button onclick="restart()">다시하기</button>
  `;
  progressEl.innerText = "";
}

function restart() {
  step = 0;
  answers = [];
  renderQuestion();
}

renderQuestion();
</script>

</body>
</html>
